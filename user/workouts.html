<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FitTrack — Workouts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg">
      <div class="bg__image" aria-hidden="true"></div>
      <div class="bg__glow bg__glow--a" aria-hidden="true"></div>
      <div class="bg__glow bg__glow--b" aria-hidden="true"></div>
      <div class="bg__vignette" aria-hidden="true"></div>
    </div>

    <header class="topbar">
      <div class="container topbar__inner">
        <a class="brand" href="/app">
          <span class="brand__dot" aria-hidden="true"></span>
          <span class="brand__name">FitTrack</span>
        </a>

        <nav class="nav" aria-label="App">
          <a class="nav__link" href="/app">Home</a>
          <a class="nav__link" href="/app/workouts">Workout</a>
          <a class="nav__link" href="/app/progress">Progress</a>
        </nav>

        <div class="topbar__actions">
          <div class="avatarMenu">
            <button class="avatarBtn" type="button" aria-label="Account" data-avatar>U</button>
            <div class="avatarPanel" data-avatar-menu>
              <div class="avatarPanel__top">
                <div class="avatarPanel__name" data-user-name>Loading…</div>
                <div class="avatarPanel__email" data-user-email></div>
              </div>
              <div class="avatarPanel__actions">
                <a class="avatarPanel__link" href="/app">Dashboard</a>
                <form action="/auth/logout" method="post">
                  <button class="btn btn--primary avatarPanel__logout" type="submit">Logout</button>
                </form>
              </div>
            </div>
          </div>
          <button class="iconbtn topbar__menu" type="button" aria-label="Open menu" data-menu>
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M5 7h14M5 12h14M5 17h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main class="appPage workoutPage" data-workout-library>
      <div class="container">
        <section class="workoutLibrary" data-workout-list-view>
          <div class="workoutLibrary__head">
            <h1 class="workoutLibrary__title">Library</h1>
            <span class="workoutLibrary__premium">Premium</span>
          </div>
          <div class="workoutFilters" role="group" aria-label="Workout filters">
            <button class="workoutChip" type="button">Equipment (65)</button>
            <button class="workoutChip" type="button">Muscles (16)</button>
            <button class="workoutChip" type="button">45-60 min</button>
          </div>
          <h2 class="workoutLibrary__sub">1 Day a Week</h2>
          <div class="workoutPlanList" data-workout-plan-list></div>
        </section>

        <section class="workoutDetail" data-workout-detail-view hidden>
          <div class="workoutDetail__top">
            <button class="workoutBack" type="button" data-workout-back>←</button>
            <div class="workoutDetail__planName" data-workout-plan-name>PLAN 1</div>
            <span class="workoutLibrary__premium">Premium</span>
          </div>

          <article class="workoutDetail__card">
            <h2 class="workoutDetail__title" data-workout-title>Full Body</h2>
            <div class="workoutMeta">
              <span data-workout-total-exercises>0 Exercises</span>
              <span data-workout-duration>0 Min</span>
              <span data-workout-calories>0 Cal</span>
            </div>
            <div class="workoutExerciseList" data-workout-exercise-list></div>
          </article>

          <button class="btn btn--primary btn--lg workoutDetail__start" type="button">START THIS PLAN</button>
        </section>
      </div>
    </main>

    <div class="mobilemenu" data-mobilemenu>
      <div class="mobilemenu__panel card" role="dialog" aria-modal="true" aria-label="Mobile menu">
        <div class="mobilemenu__top">
          <span class="brand__name">Menu</span>
          <button class="iconbtn" type="button" aria-label="Close menu" data-menu-close>
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M6 6l12 12M18 6 6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </button>
        </div>
        <div class="mobilemenu__links">
          <a class="mobilemenu__link" href="/app">Home</a>
          <a class="mobilemenu__link" href="/app/workouts">Workout</a>
          <a class="mobilemenu__link" href="/app/progress">Progress</a>
        </div>
        <div class="mobilemenu__actions">
          <form action="/auth/logout" method="post" style="width: 100%">
            <button class="btn btn--primary btn--lg" type="submit" style="width: 100%">Logout</button>
          </form>
        </div>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
