<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FitTrack — Workouts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg">
      <div class="bg__image" aria-hidden="true"></div>
      <div class="bg__glow bg__glow--a" aria-hidden="true"></div>
      <div class="bg__glow bg__glow--b" aria-hidden="true"></div>
      <div class="bg__vignette" aria-hidden="true"></div>
    </div>

    <header class="topbar">
      <div class="container topbar__inner">
        <a class="brand" href="/app">
          <span class="brand__dot" aria-hidden="true"></span>
          <span class="brand__name">FitTrack</span>
        </a>

        <nav class="nav" aria-label="App">
          <a class="nav__link" href="/app">Home</a>
          <a class="nav__link" href="/app/workouts">Workout</a>
          <a class="nav__link" href="/app/progress">Progress</a>
        </nav>

        <div class="topbar__actions">
          <div class="avatarMenu">
            <button class="avatarBtn" type="button" aria-label="Account" data-avatar>U</button>
            <div class="avatarPanel" data-avatar-menu>
              <div class="avatarPanel__top">
                <div class="avatarPanel__name" data-user-name>Loading…</div>
                <div class="avatarPanel__email" data-user-email></div>
              </div>
              <div class="avatarPanel__actions">
                <a class="avatarPanel__link" href="/app">Dashboard</a>
                <form action="/auth/logout" method="post">
                  <button class="btn btn--primary avatarPanel__logout" type="submit">Logout</button>
                </form>
              </div>
            </div>
          </div>
          <button class="iconbtn topbar__menu" type="button" aria-label="Open menu" data-menu>
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M5 7h14M5 12h14M5 17h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main class="appPage">
      <div class="container">
        <h1 class="appTitle">CREATE YOUR WORKOUT</h1>
        <section class="board">
          <form id="workout-form" class="profileRows">
            <div class="profileRow">
              <label class="profileRow__k" for="title">Plan Name</label>
              <input class="field__input profileInput" id="title" name="title" type="text" placeholder="Monday Leg Day" required />
            </div>
            <div class="profileRow">
              <label class="profileRow__k" for="performed_at">Workout Date</label>
              <input class="field__input profileInput" id="performed_at" name="performed_at" type="date" required />
            </div>
            <div class="profileRow">
              <label class="profileRow__k" for="notes">Notes</label>
              <textarea class="field__input profileInput" id="notes" name="notes" rows="3" placeholder="Focus and notes"></textarea>
            </div>
            <div id="set-rows" class="profileRows"></div>
            <div class="profileRows" style="grid-template-columns: 1fr 1fr; display: grid; gap: 10px">
              <button class="btn btn--ghost" type="button" id="add-set-btn">+ Add Exercise</button>
              <button class="btn btn--primary" type="submit">Save Workout</button>
            </div>
            <p class="muted" data-workout-message style="margin: 0"></p>
          </form>
        </section>

        <section class="board" style="margin-top: 14px">
          <div class="board__colTitle"><span>YOUR</span> SAVED WORKOUTS</div>
          <div id="workout-list" class="profileRows">
            <p class="muted">No workouts yet. Create your first one above.</p>
          </div>
        </section>
      </div>
    </main>

    <div class="mobilemenu" data-mobilemenu>
      <div class="mobilemenu__panel card" role="dialog" aria-modal="true" aria-label="Mobile menu">
        <div class="mobilemenu__top">
          <span class="brand__name">Menu</span>
          <button class="iconbtn" type="button" aria-label="Close menu" data-menu-close>
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M6 6l12 12M18 6 6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </button>
        </div>
        <div class="mobilemenu__links">
          <a class="mobilemenu__link" href="/app">Home</a>
          <a class="mobilemenu__link" href="/app/workouts">Workout</a>
          <a class="mobilemenu__link" href="/app/progress">Progress</a>
        </div>
        <div class="mobilemenu__actions">
          <form action="/auth/logout" method="post" style="width: 100%">
            <button class="btn btn--primary btn--lg" type="submit" style="width: 100%">Logout</button>
          </form>
        </div>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
